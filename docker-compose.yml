version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    network_mode: "host"
    volumes:
      - shared-data:/aut0arch/app/public # Explainer writes to this directory
    environment:
      - FLASK_ENV=development
      - OLLAMA_HOST=http://localhost:11434
    develop:
      watch:
        - action: sync
          path: ./server
          target: /aut0arch/server
        - action: sync
          path: ./explainer
          target: /aut0arch/explainer
        - action: sync
          path: ./clustering
          target: /aut0arch/clustering
        - action: sync
          path: ./parser
          target: /aut0arch/parser

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - shared-data:/app/public # Frontend reads generated architecture from here
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    networks:
      - aut0arch-net
    depends_on:
      - backend

volumes:
  shared-data:


networks:
  aut0arch-net:
    driver: bridge
